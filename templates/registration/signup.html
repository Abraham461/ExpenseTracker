{% extends 'base.html' %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card card fade-in">
    <div class="card-body">
      <h2 class="page-title-sm">Create account</h2>
      <p class="page-subtitle">Start tracking daily expenses and staying on budget.</p>
      <form method="post" class="app-form">{% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Sign Up</button>
          <a href="{% url 'login' %}" class="btn btn-ghost">Back to login</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
