{% extends 'base.html' %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card card fade-in">
    <div class="card-body">
      <h2 class="page-title-sm">Welcome back</h2>
      <p class="page-subtitle">Log in to review your expenses and alerts.</p>
      <form method="post" class="app-form">{% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Login</button>
          <a href="{% url 'signup' %}" class="btn btn-ghost">Create account</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
