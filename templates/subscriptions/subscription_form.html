{% extends 'base.html' %}
{% block content %}
<div class="form-card card fade-in">
  <div class="card-body">
    <h2 class="page-title-sm">{{ title }}</h2>
    <p class="page-subtitle">Log your expense details and keep your daily budget on track.</p>
    <form method="post" class="app-form">{% csrf_token %}
      {{ form.as_p }}
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Save</button>
        <a href="{% url 'expense_list' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
