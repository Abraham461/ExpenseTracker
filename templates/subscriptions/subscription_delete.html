{% extends 'base.html' %}
{% block content %}
<div class="form-card card fade-in">
  <div class="card-body">
    <h2 class="page-title-sm">Delete Expense</h2>
    <p class="page-subtitle">This action cannot be undone. Make sure this is the right expense.</p>
    <div class="alert alert-warning d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-triangle"></i>
      <span>Delete <strong>{{ currency_prefix }}{{ expense.amount }}</strong> from {{ expense.spent_on }}?</span>
    </div>
    <form method="post" class="d-flex gap-2">{% csrf_token %}
      <button class="btn btn-danger" type="submit">Delete</button>
      <a href="{% url 'expense_list' %}" class="btn btn-ghost">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
